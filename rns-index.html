<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RNS Live</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --bg:        #0a0a0a;
    --bg2:       #111118;
    --bg3:       #18181f;
    --border:    #222233;
    --text:      #cdd6f4;
    --muted:     #aaaacc;
    --accent:    #cba6f7;
    --green:     #a6e3a1;
    --blue:      #89b4fa;
    --red:       #f38ba8;
    --yellow:    #f9e2af;
}

body {
    background: var(--bg);
    color: var(--text);
    font-family: monospace;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    font-size: 12px;
}

/* ── Header ─────────────────────────────────────────────────────────────── */
#header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 5px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
}
#header h1 {
    font-size: 13px;
    color: var(--accent);
    font-weight: bold;
    flex-shrink: 0;
}
#my-addr {
    font-size: 10px;
    color: var(--muted);
    flex: 1;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
#my-addr span.hash-val {
    color: var(--blue);
    cursor: pointer;
    user-select: all;
}
#status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--red);
    flex-shrink: 0;
}
#status-dot.connected { background: var(--green); }

/* ── Main layout ─────────────────────────────────────────────────────────── */
#main {
    display: flex;
    flex: 1;
    overflow: hidden;
}

/* ── Left panel: announces ───────────────────────────────────────────────── */
#announces-panel {
    width: 260px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
}
#announces-panel h2 {
    padding: 6px 10px;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
}
#announces-list {
    flex: 1;
    overflow-y: auto;
}
.announce-row {
    padding: 7px 10px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
}
.announce-row:hover  { background: var(--bg3); }
.announce-row.active { background: #1a1a2e; border-left: 2px solid var(--accent); }
.announce-row.new-flash { animation: flash-ann 0.8s ease-out; }
@keyframes flash-ann {
    0%   { background: #2a1a3a; }
    100% { background: transparent; }
}
.ann-name {
    color: var(--text);
    font-size: 12px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.ann-meta {
    color: var(--muted);
    font-size: 10px;
    margin-top: 2px;
    display: flex;
    justify-content: space-between;
}
.ann-hash { color: var(--blue); }
.ann-hops { color: var(--yellow); }

/* ── Unread message indicators ───────────────────────────────────────────── */
.announce-row.unread .ann-name::after {
    content: '';
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #4da6ff;
    margin-left: 7px;
    vertical-align: middle;
    box-shadow: 0 0 6px #4da6ff;
}
#msg-alert {
    font-size: 14px;
    margin-left: 6px;
    animation: pulse-alert 1.2s ease-in-out infinite;
    display: none;
}
@keyframes pulse-alert {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.5; transform: scale(1.2); }
}

/* ── Announce button footer (bottom of left panel) ───────────────────────── */
#ann-footer {
    border-top: 1px solid var(--border);
    padding: 8px 10px;
    background: var(--bg2);
    flex-shrink: 0;
}
#announce-btn {
    width: 100%;
    background: #1e2a4a;
    border: 1px solid #2a3a6a;
    color: var(--blue);
    font-family: monospace;
    font-size: 11px;
    padding: 5px 0;
    cursor: pointer;
    border-radius: 3px;
}
#announce-btn:hover { background: #253560; }
#announce-btn.flash {
    background: #1e4a1e;
    border-color: #2a6a2a;
    color: var(--green);
}

/* ── Right panel: messages ───────────────────────────────────────────────── */
#messages-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
#conv-header {
    padding: 6px 12px;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
}
#conv-title { color: var(--accent); font-size: 12px; }

#messages-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
}
.msg-bubble {
    max-width: 80%;
    padding: 6px 10px;
    border-radius: 4px;
    line-height: 1.5;
}
.msg-bubble.in {
    background: var(--bg3);
    border: 1px solid var(--border);
    align-self: flex-start;
}
.msg-bubble.out {
    background: #1e1e3a;
    border: 1px solid #2a2a5a;
    align-self: flex-end;
}
.msg-content { color: var(--text); word-break: break-word; }
.msg-meta {
    font-size: 9px;
    color: var(--muted);
    margin-top: 3px;
    display: flex;
    gap: 8px;
    align-items: center;
}
.msg-from.in  { color: var(--blue); }
.msg-from.out { color: var(--accent); }
.msg-status { font-size: 10px; margin-left: auto; }
.msg-status.sent      { color: var(--muted); }
.msg-status.delivered { color: var(--green); }

.no-conv {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 12px;
    text-align: center;
    padding: 20px;
}

/* ── Compose bar ─────────────────────────────────────────────────────────── */
#compose {
    border-top: 1px solid var(--border);
    padding: 8px 12px;
    display: flex;
    gap: 8px;
    flex-shrink: 0;
    background: var(--bg2);
}
#compose-input {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: monospace;
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 3px;
    resize: none;
    height: 34px;
    line-height: 1.4;
}
#compose-input:focus { outline: none; border-color: var(--accent); }
#send-btn {
    background: #1e3a1e;
    border: 1px solid #2a5a2a;
    color: var(--green);
    font-family: monospace;
    font-size: 12px;
    font-weight: bold;
    padding: 6px 16px;
    cursor: pointer;
    border-radius: 3px;
    flex-shrink: 0;
}
#send-btn:hover    { background: #265026; }
#send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

</style>
</head>
<body>

<div id="header">
    <h1>RNS Live</h1>
    <div id="my-addr">
        <span class="hash-val" id="my-hash" title="Click to copy full address">—</span>
        &nbsp;·&nbsp;<span id="my-name" style="color:var(--accent)">—</span>
    </div>
    <div id="status-dot" title="WebSocket status"></div>
</div>

<div id="main">

    <!-- Left panel: announces -->
    <div id="announces-panel">
        <h2>Announces (<span id="ann-count">0</span>)<span id="msg-alert">✉️</span></h2>
        <div id="announces-list">
            <div class="no-conv">Waiting for announces…</div>
        </div>
        <div id="ann-footer">
            <button id="announce-btn">📡 Announce Now</button>
        </div>
    </div>

    <!-- Right panel: messages -->
    <div id="messages-panel">
        <div id="conv-header">
            <span>Messages</span>
            <span id="conv-title">— select a node —</span>
        </div>
        <div id="messages-list">
            <div class="no-conv">Select a node from the announces panel<br>to open a conversation.</div>
        </div>
        <div id="compose">
            <textarea id="compose-input" placeholder="Select a node first…" disabled></textarea>
            <button id="send-btn" disabled>Send</button>
        </div>
    </div>

</div>

<script>
'use strict';

// ── State ──────────────────────────────────────────────────────────────────────
let announces     = {};
let conversations = {};
let activePeer    = null;
let myHash        = null;
let unreadHashes  = new Set();   // hashes with unread incoming messages

// ── DOM refs ───────────────────────────────────────────────────────────────────
const annList      = document.getElementById('announces-list');
const annCount     = document.getElementById('ann-count');
const msgList      = document.getElementById('messages-list');
const convTitle    = document.getElementById('conv-title');
const composeInput = document.getElementById('compose-input');
const sendBtn      = document.getElementById('send-btn');
const statusDot    = document.getElementById('status-dot');
const myHashEl     = document.getElementById('my-hash');
const myNameEl     = document.getElementById('my-name');
const announceBtn  = document.getElementById('announce-btn');

// ── Utilities ──────────────────────────────────────────────────────────────────
function shortHash(h) { return h ? h.slice(0, 12) + '…' : '—'; }

function updateAlerts() {
    const alertEl = document.getElementById('msg-alert');
    alertEl.style.display = unreadHashes.size > 0 ? 'inline' : 'none';
}

function fmtTime(ts) {
    const d   = new Date(ts * 1000);
    const now = new Date();
    if (d.toDateString() === now.toDateString()) {
        return d.toTimeString().slice(0, 5);
    }
    return d.toLocaleDateString([], {month:'short', day:'numeric'})
        + ' ' + d.toTimeString().slice(0, 5);
}

function timeAgo(ts) {
    const s = Math.floor(Date.now() / 1000 - ts);
    if (s < 60)    return s + 's ago';
    if (s < 3600)  return Math.floor(s / 60) + 'm ago';
    if (s < 86400) return Math.floor(s / 3600) + 'h ago';
    return Math.floor(s / 86400) + 'd ago';
}

function escHtml(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
             .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function statusIcon(status) {
    if (status === 'delivered')
        return '<span class="msg-status delivered" title="Delivered">✓✓</span>';
    return '<span class="msg-status sent" title="Sent">✓</span>';
}

// ── Renders ────────────────────────────────────────────────────────────────────

function renderAnnounces() {
    const sorted = Object.values(announces).sort((a, b) => b.ts - a.ts);
    annCount.textContent = sorted.length;

    if (sorted.length === 0) {
        annList.innerHTML = '<div class="no-conv">Waiting for announces…</div>';
        return;
    }

    annList.innerHTML = '';
    sorted.forEach(ann => {
        const row = document.createElement('div');
        row.className = 'announce-row'
            + (ann.hash === activePeer ? ' active' : '')
            + (unreadHashes.has(ann.hash) ? ' unread' : '');
        row.dataset.hash = ann.hash;
        const hops = ann.hops === 1  ? 'direct'
                   : ann.hops >  1  ? ann.hops + ' hops'
                   : '?';
        row.innerHTML = `
            <div class="ann-name">${escHtml(ann.name)}</div>
            <div class="ann-meta">
                <span class="ann-hash">${shortHash(ann.hash)}</span>
                <span class="ann-hops">${hops}</span>
                <span>${timeAgo(ann.ts)}</span>
            </div>`;
        row.addEventListener('click', () => selectPeer(ann.hash, ann.name));
        annList.appendChild(row);
    });
}

function renderMessages() {
    if (!activePeer) {
        msgList.innerHTML = '<div class="no-conv">Select a node from the announces panel<br>to open a conversation.</div>';
        return;
    }
    const msgs = conversations[activePeer] || [];
    if (msgs.length === 0) {
        msgList.innerHTML = '<div class="no-conv">No messages yet.<br>Type below to start the conversation.</div>';
        return;
    }
    msgList.innerHTML = '';
    msgs.forEach(m => {
        const bubble = document.createElement('div');
        bubble.className = 'msg-bubble ' + m.direction;
        if (m.msg_hash) bubble.dataset.msgHash = m.msg_hash;
        const fromLabel = m.direction === 'in'
            ? (m.peer_name || shortHash(m.peer_hash)) : 'Me';
        bubble.innerHTML = `
            <div class="msg-content">${escHtml(m.content)}</div>
            <div class="msg-meta">
                <span class="msg-from ${m.direction}">${escHtml(fromLabel)}</span>
                <span>${fmtTime(m.ts)}</span>
                ${m.direction === 'out' ? statusIcon(m.status) : ''}
            </div>`;
        msgList.appendChild(bubble);
    });
    msgList.scrollTop = msgList.scrollHeight;
}

// ── Peer selection ─────────────────────────────────────────────────────────────

function selectPeer(hash, name) {
    activePeer = hash;
    unreadHashes.delete(hash);
    updateAlerts();
    convTitle.textContent = name || shortHash(hash);
    composeInput.disabled = false;
    sendBtn.disabled      = false;
    composeInput.placeholder = 'Message to ' + (name || shortHash(hash)) + '…';
    renderAnnounces();
    renderMessages();
    if (!conversations[hash]) {
        sendCmd({ cmd: 'get_messages', peer_hash: hash });
    }
}

// ── Send ───────────────────────────────────────────────────────────────────────

function sendMessage() {
    const content = composeInput.value.trim();
    if (!content || !activePeer) return;
    sendCmd({ cmd: 'send', dest: activePeer, content });
    composeInput.value = '';
}

sendBtn.addEventListener('click', sendMessage);
composeInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// ── Announce now button ────────────────────────────────────────────────────────

announceBtn.addEventListener('click', () => {
    sendCmd({ cmd: 'announce_now' });
    announceBtn.textContent = '📡 Announcing…';
    announceBtn.disabled = true;
});

function onAnnounceSent() {
    announceBtn.textContent = '📡 Sent ✓';
    announceBtn.classList.add('flash');
    setTimeout(() => {
        announceBtn.textContent = '📡 Announce Now';
        announceBtn.classList.remove('flash');
        announceBtn.disabled = false;
    }, 2000);
}

// ── Copy my address ────────────────────────────────────────────────────────────

myHashEl.addEventListener('click', () => {
    if (myHash) {
        navigator.clipboard.writeText(myHash).then(() => {
            myHashEl.style.color = 'var(--green)';
            setTimeout(() => myHashEl.style.color = '', 1000);
        });
    }
});

// ── Delivery receipt update ────────────────────────────────────────────────────

function updateReceiptInView(msg_hash, status) {
    Object.values(conversations).forEach(msgs => {
        if (!msgs) return;
        msgs.forEach(m => { if (m.msg_hash === msg_hash) m.status = status; });
    });
    const bubble = msgList.querySelector(`[data-msg-hash="${msg_hash}"]`);
    if (bubble) {
        const el = bubble.querySelector('.msg-status');
        if (el) {
            el.className = 'msg-status delivered';
            el.title = 'Delivered';
            el.textContent = '✓✓';
        }
    }
}

// ── Periodic time label refresh ────────────────────────────────────────────────
setInterval(() => {
    if (Object.keys(announces).length > 0) renderAnnounces();
}, 15000);

// ── Server message handlers ────────────────────────────────────────────────────

function handleAnnounces(list) {
    list.forEach(a => { announces[a.hash] = a; });
    renderAnnounces();
}

function handleAnnounce(a) {
    const isNew = !announces[a.hash];
    announces[a.hash] = a;
    renderAnnounces();
    if (isNew) {
        const row = annList.querySelector(`[data-hash="${a.hash}"]`);
        if (row) {
            row.classList.add('new-flash');
            row.addEventListener('animationend',
                () => row.classList.remove('new-flash'), {once: true});
        }
    }
}

function handleConversations(list) {
    list.forEach(c => {
        if (!conversations[c.peer_hash]) conversations[c.peer_hash] = null;
        if (c.peer_hash && !announces[c.peer_hash]) {
            announces[c.peer_hash] = {
                hash: c.peer_hash,
                name: c.peer_name || shortHash(c.peer_hash),
                hops: -1,
                ts:   c.ts,
            };
        }
    });
    renderAnnounces();
}

function handleConversation(data) {
    conversations[data.peer_hash] = data.messages;
    if (data.peer_hash === activePeer) renderMessages();
}

function handleMessage(msg) {
    const h = msg.peer_hash;
    if (!conversations[h]) conversations[h] = [];
    conversations[h].push(msg);
    if (msg.peer_name && announces[h]) announces[h].name = msg.peer_name;
    if (h === activePeer) {
        renderMessages();
    } else {
        if (msg.direction === 'in') {
            unreadHashes.add(h);
            updateAlerts();
        }
        const row = annList.querySelector(`[data-hash="${h}"]`);
        if (row) {
            row.classList.add('new-flash');
            if (msg.direction === 'in') row.classList.add('unread');
            row.addEventListener('animationend',
                () => row.classList.remove('new-flash'), {once: true});
        }
    }
}

function handleIdentity(data) {
    myHash = data.hash;
    myHashEl.textContent = shortHash(data.hash);
    myHashEl.title = data.hash + ' — click to copy full address';
    myNameEl.textContent = data.name || '';
}

// ── WebSocket ──────────────────────────────────────────────────────────────────

const wsHost = window.location.hostname;
let ws;

function connect() {
    ws = new WebSocket('ws://' + wsHost + ':8083');
    ws.onopen = () => {
        statusDot.className = 'connected';
        sendCmd({ cmd: 'get_announces' });
        sendCmd({ cmd: 'get_conversations' });
        sendCmd({ cmd: 'get_identity' });
    };
    ws.onclose = () => { statusDot.className = ''; setTimeout(connect, 3000); };
    ws.onerror = () => { statusDot.className = ''; };
    ws.onmessage = (event) => {
        let msg;
        try { msg = JSON.parse(event.data); } catch { return; }
        switch (msg.type) {
            case 'announces':     handleAnnounces(msg.announces);        break;
            case 'announce':      handleAnnounce(msg.announce);           break;
            case 'conversations': handleConversations(msg.conversations); break;
            case 'conversation':  handleConversation(msg);               break;
            case 'message':       handleMessage(msg.msg);                break;
            case 'identity':      handleIdentity(msg);                   break;
            case 'receipt':       updateReceiptInView(msg.msg_hash, msg.status); break;
            case 'announce_sent': onAnnounceSent();                      break;
        }
    };
}

function sendCmd(obj) {
    if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
}

connect();
</script>

</body>
</html>
